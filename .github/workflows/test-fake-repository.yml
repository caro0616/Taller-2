name: Test Fake Repository

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test-fake-repository:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r orders_app/requirements.txt

      - name: Run fake repository test
        run: |
          cd orders_app
          pytest -q test_integration_with_fake.py
